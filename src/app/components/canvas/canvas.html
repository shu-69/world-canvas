@if(toolbarVisible()) {
<div class="toolbar" @toolbarAnimation>
  <button class="round" (click)="setPen()" matTooltip="Select Pen tool" [matTooltipShowDelay]="tooltipShowDelay">
    <i class="fi fi-ss-pen-clip"></i>
  </button>
  <button class="round" (click)="setEraser()" matTooltip="Select Eraser tool" [matTooltipShowDelay]="tooltipShowDelay">
    <i class="fi fi-sr-eraser"></i>
  </button>
  <button class="round" 
    [matMenuTriggerFor]="shapeMenu"
    #shapeTrigger="matMenuTrigger"
    (mouseenter)="shapeTrigger.openMenu()"
    matTooltip="Shapes" 
    [matTooltipShowDelay]="tooltipShowDelay">
    <i class="fi fi-ss-resources"></i>
  </button>

  <mat-menu #shapeMenu="matMenu" class="shapes-menu" (mouseleave)="shapeTrigger.closeMenu()">
    <button class="round" mat-menu-item (click)="setShape('rect')"><i class="fi fi-rs-rectangle-horizontal"></i></button>
    <button class="round" mat-menu-item (click)="setShape('circle')"><i class="fi fi-rr-circle"></i></button>
    <button class="round" mat-menu-item (click)="setShape('line')"><i class="fi fi-br-slash"></i></button>
    <button class="round" mat-menu-item (click)="setShape('triangle')"><i class="fi fi-rs-triangle"></i></button>
  </mat-menu>
  <!-- <div class="shape-menu" (mouseenter)="showShapes = true" (mouseleave)="showShapes = false">
    <button class="round" matTooltip="Shapes" [matTooltipShowDelay]="tooltipShowDelay">
      <i class="fi fi-ss-resources"></i>
    </button>
    @if(showShapes) {
      <div class="shape-submenu" @shapeMenuAnim>
        <button class="round" (click)="setShape('rect')" matTooltip="Rectangle" [matTooltipShowDelay]="tooltipShowDelay">▭</button>
        <button class="round" (click)="setShape('circle')" matTooltip="Circle" [matTooltipShowDelay]="tooltipShowDelay">⬭</button>
        <button class="round" (click)="setShape('line')" matTooltip="Line" [matTooltipShowDelay]="tooltipShowDelay">╱</button>
        <button class="round" (click)="setShape('triangle')" matTooltip="Triangle" [matTooltipShowDelay]="tooltipShowDelay">△</button>
      </div>
    }
  </div> -->
  <!-- <button class="round" (click)="setRect()">▭</button>
  <button class="round" (click)="setCircle()">⬭</button>
  <button class="round" (click)="setLine()">╱</button> -->
  <button class="round" (click)="setText()" matTooltip="Insert text" [matTooltipShowDelay]="tooltipShowDelay">
    <i class="fi fi-sr-text-box-edit"></i>
  </button>

  <input class="color-picker" type="color" [(ngModel)]="color" (change)="setColor()" />
  <input type="range" [(ngModel)]="brushSize" min="1" max="20" (input)="setSize()" />

  <button class="undo" (click)="undo()" matTooltip="Undo" [matTooltipShowDelay]="tooltipShowDelay">
    <i class="fi fi-br-undo-alt"></i>
  </button>
  <button class="redo" (click)="redo()" matTooltip="Redo" [matTooltipShowDelay]="tooltipShowDelay">
    <i class="fi fi-br-redo-alt"></i>
  </button>

  <button class="insert-image-button" (click)="redo()" matTooltip="Insert image" [matTooltipShowDelay]="tooltipShowDelay">
    <i class="fi fi-sr-add-image"></i>
  </button>

  <button class="export" (click)="exportCanvas()" matTooltip="Export canvas" [matTooltipShowDelay]="tooltipShowDelay">
    <i class="fi fi-sr-file-export"></i>
    Export
  </button>
  <!-- <button (click)="clear()">🗑 Clear</button> -->
</div>
}

<div #CanvasWrapper class="canvas-wrapper">
  <canvas #canvas></canvas>
</div>
